<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta class="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="index.css">
        <title>Changelog</title>
    </head>

    <body>
        <div class="changelog">
            <h1 class="changelog__title">Changelog</h1>
            <p class="changelog__subtitle">Here's everything we've shipped recently</p>

            <div class="timeline">
                <ul class="changelog__list">
                    <li class="changelog__item">
                        <span class="date">Sep 1, 2023</span>
                        <div class="content">
                            <h3 class="changelog__version">Initial Release</h3>
                        </div>
                    </li>

                    <li class="changelog__item">
                        <span class="date">Sep 15, 2023</span>
                        <div class="content">
                            <h3 class="changelog__version">Minor Updates</h3>
                        </div>
                    </li>

                    <li class="changelog__item">
                        <span class="date">Oct 1, 2023</span>
                        <div class="content">
                            <h3 class="changelog__version">Major Update</h3>
                        </div>
                    </li>

                    <li class="changelog__item">
                        <span class="date">Nov 1, 2023</span>
                        <div class="content">
                            <h3 class="changelog__version">Feature Release</h3>
                        </div>
                    </li>

                    <li class="changelog__item">
                        <span class="date">Dec 1, 2023</span>
                        <div class="content">
                            <h3 class="changelog__version">Performance Improvements</h3>
                        </div>
                    </li>
                </ul>
            </div>

            <button class="button">Visit Complete Changelog</button>
        </div>
    </body>

</html>
